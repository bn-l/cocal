name: CodexSwitcher
options:
  bundleIdPrefix: com.bn-l
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit.git
    from: 0.6.0

targets:
  CodexSwitcher:
    type: application
    platform: macOS
    sources:
      - path: Sources/CodexSwitcher
    dependencies:
      - package: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bn-l.codex-switcher
        PRODUCT_NAME: Cocal
        SWIFT_VERSION: "6.2"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: CodexSwitcher.entitlements
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "Local Dev Signing"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: XCODE_BUILD

  CodexSwitcherTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexSwitcherTests
    settings:
      base:
        SWIFT_VERSION: "6.2"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "Local Dev Signing"
    dependencies:
      - target: CodexSwitcher

schemes:
  CodexSwitcher:
    build:
      targets:
        CodexSwitcher: all
        CodexSwitcherTests: [test]
    run:
      executable: CodexSwitcher
    test:
      targets:
        - CodexSwitcherTests
